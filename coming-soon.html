<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon · Inkwell Impressions</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Libre+Baskerville:wght@400;700&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#0B132B',
                        'brand-red': '#D62828',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Libre Baskerville', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0B132B;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Gradient */
        .coming-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #0B132B 0%, #1C2541 50%, #0B132B 100%);
            z-index: 0;
        }

        /* Glow Effect */
        .glow {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(214, 40, 40, 0.15), transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .glow-2 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
            opacity: 0.5;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }

        /* Main Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 40px rgba(214, 40, 40, 0.2));
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #D62828 50%, #ffffff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite;
            line-height: 1.1;
        }

        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.8rem auto;
            max-width: 300px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(214, 40, 40, 0.4), transparent);
        }

        .divider i {
            color: #D62828;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }

        .description {
            color: rgba(255, 255, 255, 0.5);
            max-width: 450px;
            margin: 1.2rem auto;
            font-size: 0.95rem;
            line-height: 1.7;
            font-weight: 300;
        }

        /* Social Icons */
        .social {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .social a {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1rem;
        }

        .social a:hover {
            border-color: #D62828;
            background: #D62828;
            color: #fff;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(214, 40, 40, 0.3);
        }

        .back-home {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            text-decoration: none;
            margin-top: 1.8rem;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            color: #ffffff;
        }

        .back-home i {
            margin-right: 6px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo {
                width: 120px;
            }
            .glow-1 {
                width: 250px;
                height: 250px;
            }
            .glow-2 {
                width: 400px;
                height: 400px;
            }
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="coming-bg"></div>

    <!-- Glow Effects -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Content -->
    <div class="content">

        <!-- Logo -->
        <img src="./logo solution white.png" alt="Inkwell Impressions" class="logo">

        <!-- Title -->
        <h1 class="title">Coming Soon</h1>

        <!-- Subtitle -->
        <p class="subtitle">Something Exciting Is On The Way</p>

        <!-- Divider -->
        <div class="divider">
            <i class="fa-solid fa-asterisk"></i>
            <i class="fa-solid fa-circle"></i>
            <i class="fa-solid fa-asterisk"></i>
        </div>

        <!-- Description -->
        <p class="description">
            We're crafting something amazing to help you build brands that leave lasting impressions.
        </p>

        <!-- Social Links -->
        <div class="social">
            <a href="https://www.linkedin.com/in/inkwell-impressions-2007883b4" target="_blank">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a href="https://www.instagram.com/inkwellimpressionspromo/" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com/profile.php?id=61552261877738" target="_blank">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://x.com/Inkwell_Imp" target="_blank">
                <i class="fa-brands fa-twitter"></i>
            </a>
        </div>

        <!-- Back to Home -->
        <a href="index.html" class="back-home">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

    </div>

    <!-- GSAP Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from('.content', {
                opacity: 0,
                y: 50,
                duration: 1.2,
                ease: 'power2.out'
            });

            gsap.from('.logo', {
                opacity: 0,
                scale: 0.8,
                duration: 1,
                delay: 0.3,
                ease: 'back.out(1.7)'
            });

            gsap.from('.title, .subtitle, .divider, .description, .social, .back-home', {
                opacity: 0,
                y: 20,
                duration: 0.6,
                stagger: 0.12,
                delay: 0.6,
                ease: 'power2.out'
            });
        });
    </script>

</body>

</html>
